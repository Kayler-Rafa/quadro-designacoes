<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quadro de Anúncios</title>
  <link rel="stylesheet" href="quadro-styles.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a1a;
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
      padding: 24px 16px 48px;
    }
    .loading {
      text-align: center;
      padding: 100px 24px;
      color: #666;
      font-size: 15px;
      font-family: Arial, Helvetica, sans-serif;
    }
    .erro {
      text-align: center;
      padding: 80px 24px;
      color: #c55;
      font-size: 14px;
      font-family: Arial, Helvetica, sans-serif;
    }
  </style>
</head>
<body>
  <div id="quadroOutput">
    <div class="loading">Carregando quadro…</div>
  </div>

  <script src="quadro-lib.js"></script>
  <script>
    (async () => {
      const now   = new Date();
      const year  = now.getFullYear();
      const month = now.getMonth() + 1;
      const out   = document.getElementById('quadroOutput');
      try {
        const { desig, rfs, rvm, grupos } = await fetchAll(year, month);
        out.innerHTML = buildQuadro(year, month, desig, rfs, rvm, grupos);
      } catch (e) {
        out.innerHTML = `<div class="erro">Erro ao carregar: ${e.message}</div>`;
      }
    })();
  </script>
</body>
</html>
