<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RFS — Reunião de Fim de Semana</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── Cores de linha por tipo ── */
    .rfs-row.especial   td.cell-data { border-left: 4px solid #1a4f8a; }
    .rfs-row.assembleia td.cell-data { border-left: 4px solid #7a4800; }
    .rfs-row.congresso  td.cell-data { border-left: 4px solid #4a1a7a; }

    /* ── Badge de tipo especial ── */
    .tipo-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .4px;
      padding: 2px 7px;
      border-radius: 10px;
      margin-top: 4px;
      white-space: nowrap;
    }
    .tipo-badge.especial   { background: #d0e4f7; color: #1a4f8a; }
    .tipo-badge.assembleia { background: #f7e4c0; color: #7a4800; }
    .tipo-badge.congresso  { background: #e8d0f7; color: #4a1a7a; }

    /* ── Coluna Orador: nome + congregação ── */
    .orador-nome { font-weight: 600; font-size: 14px; }
    .orador-cong { font-size: 12px; color: #888; }

    /* ── Tema: itálico quando vazio ── */
    .tema-vazio { color: #bbb; font-style: italic; font-weight: 400; }

    /* ── Colunas ── */
    .col-data-rfs  { width: 90px; }
    .col-tema      { /* flex */ }
    .col-orador    { width: 170px; }
    .col-pres      { width: 150px; }

    /* ════════════════════════════════════════
       MOBILE — cards (igual à tabela mecânica)
    ════════════════════════════════════════ */
    @media (max-width: 640px) {
      #rfsTable,
      #rfsTable tbody,
      #rfsTable tr,
      #rfsTable td {
        display: block;
        width: 100%;
      }
      #rfsTable thead { display: none; }

      #rfsTable tbody tr {
        background: #fff !important;
        border-radius: 8px;
        box-shadow: 0 2px 6px rgba(0,0,0,.10);
        margin-bottom: 14px;
        overflow: hidden;
      }
      #rfsTable tbody tr:hover { background: #fff !important; }

      #rfsTable tbody td.cell-data {
        background: #111;
        color: #fff;
        font-size: 15px;
        font-weight: 700;
        text-align: left;
        padding: 10px 14px;
        border-bottom: none;
        border-left: none !important;
      }
      #rfsTable tbody td.cell-data::before { display: none; }

      /* Badge de tipo dentro do card mobile */
      #rfsTable tbody td.cell-data .tipo-badge.especial   { background: rgba(255,255,255,.2); color: #fff; }
      #rfsTable tbody td.cell-data .tipo-badge.assembleia { background: rgba(255,255,255,.2); color: #fff; }
      #rfsTable tbody td.cell-data .tipo-badge.congresso  { background: rgba(255,255,255,.2); color: #fff; }

      #rfsTable tbody td {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        padding: 10px 14px;
        font-size: 13px;
        text-align: right;
        border-bottom: 1px solid #f0f0f0;
      }
      #rfsTable tbody td:last-child { border-bottom: none; }
      #rfsTable tbody td::before {
        content: attr(data-label);
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: .4px;
        color: #888;
        text-align: left;
        flex-shrink: 0;
        margin-right: 10px;
        padding-top: 2px;
      }
      #rfsTable .orador-nome { text-align: right; }
      #rfsTable .orador-cong { text-align: right; }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <ul class="navbar-links">
      <li><a href="/designacoes" class="nav-link">Designações</a></li>
      <li><a href="/rvm.html" class="nav-link">RVM</a></li>
      <li><a href="/rfs.html" class="nav-link active">RFS</a></li>
      <li><a href="/grupos.html" class="nav-link">Grupos</a></li>
      <li><a href="/quadro.html" class="nav-link">Quadro</a></li>
      <li style="margin-left: auto"><a href="/mapa.html" class="nav-link">Mapa</a></li>
    </ul>
  </nav>

  <div class="app">

    <!-- Month navigation -->
    <div class="month-nav">
      <button class="nav-btn" id="prevMonth">&#8592;</button>
      <span class="month-label" id="monthLabel">…</span>
      <button class="nav-btn" id="nextMonth">&#8594;</button>
    </div>

    <!-- Seção -->
    <section class="section">
      <div class="section-header">
        <h1 class="section-title">Reunião de Fim de Semana</h1>
        <button class="generate-btn" id="refreshBtn">Atualizar</button>
      </div>

      <div class="table-wrapper">
        <table class="assignments-table" id="rfsTable">
          <thead>
            <tr>
              <th class="col-data-rfs">Data</th>
              <th class="col-tema">Tema</th>
              <th class="col-orador">Orador<br>(Congregação)</th>
              <th class="col-pres">Presidente</th>
            </tr>
          </thead>
          <tbody id="rfsBody">
            <tr><td colspan="4" style="text-align:center;padding:40px;color:#aaa;">Carregando…</td></tr>
          </tbody>
        </table>
      </div>
    </section>

  </div>

  <script>
  /* ══════════════════════════════════════════════════════════
     CONSTANTES
  ══════════════════════════════════════════════════════════ */
  const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
                 'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const MESES_ABREV = ['jan','fev','mar','abr','mai','jun',
                       'jul','ago','set','out','nov','dez'];

  const TIPO_LABEL = {
    especial:   'Especial',
    assembleia: 'Assembleia',
    congresso:  'Congresso',
  };

  const h = s => String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');

  /* ══════════════════════════════════════════════════════════
     ESTADO
  ══════════════════════════════════════════════════════════ */
  let allReunioes = [];   // array completo da API
  let monthKeys   = [];   // keys únicas "YYYY-MM" ordenadas
  let curIdx      = 0;    // índice atual em monthKeys

  /* ══════════════════════════════════════════════════════════
     UTILITÁRIOS DE DATA
  ══════════════════════════════════════════════════════════ */
  function monthKey(isoDate)  { return isoDate.slice(0, 7); }
  function yearOf(isoDate)    { return parseInt(isoDate.slice(0, 4)); }
  function monthOf(isoDate)   { return parseInt(isoDate.slice(5, 7)); }
  function dayOf(isoDate)     { return parseInt(isoDate.slice(8, 10)); }

  // "2026-06-07" → "7-jun."
  function formatDateShort(isoDate) {
    const d = dayOf(isoDate);
    const m = monthOf(isoDate) - 1;
    return `${d}-${MESES_ABREV[m]}.`;
  }

  // "2026-06" → "Junho 2026"
  function labelFromKey(key) {
    const [y, m] = key.split('-');
    return `${MESES[parseInt(m) - 1]} ${y}`;
  }

  /* ══════════════════════════════════════════════════════════
     RENDER DA TABELA DO MÊS ATUAL
  ══════════════════════════════════════════════════════════ */
  function renderMonth() {
    const key    = monthKeys[curIdx];
    const lista  = allReunioes.filter(r => monthKey(r.date) === key);
    const tbody  = document.getElementById('rfsBody');

    // Atualiza label e botões
    document.getElementById('monthLabel').textContent = labelFromKey(key);
    document.getElementById('prevMonth').disabled = curIdx === 0;
    document.getElementById('nextMonth').disabled = curIdx === monthKeys.length - 1;

    if (lista.length === 0) {
      tbody.innerHTML = `<tr><td colspan="4" class="empty-state">Nenhuma reunião neste mês.</td></tr>`;
      return;
    }

    tbody.innerHTML = lista.map(r => {
      const tipo    = r.tipo || 'normal';
      const dateStr = formatDateShort(r.date);
      const isEsp   = tipo !== 'normal';

      // Célula de data (com badge se for especial)
      const badgeHTML = isEsp
        ? `<br><span class="tipo-badge ${h(tipo)}">${h(TIPO_LABEL[tipo] || tipo)}</span>`
        : '';

      // Tema
      const temaHTML = r.tema
        ? h(r.tema)
        : `<span class="tema-vazio">—</span>`;

      // Orador + congregação
      const oradorHTML = r.orador || r.congregacao
        ? `<span class="orador-nome">${h(r.orador || '—')}</span>` +
          (r.congregacao ? `<br><span class="orador-cong">(${h(r.congregacao)})</span>` : '')
        : `<span class="tema-vazio">—</span>`;

      // Presidente
      const presHTML = r.presidente
        ? h(r.presidente)
        : `<span class="tema-vazio">—</span>`;

      return `<tr class="rfs-row ${h(tipo)}">
        <td class="cell-data col-data-rfs" data-label="Data">${dateStr}${badgeHTML}</td>
        <td data-label="Tema">${temaHTML}</td>
        <td data-label="Orador">${oradorHTML}</td>
        <td data-label="Presidente">${presHTML}</td>
      </tr>`;
    }).join('');
  }

  /* ══════════════════════════════════════════════════════════
     NAVEGAÇÃO
  ══════════════════════════════════════════════════════════ */
  document.getElementById('prevMonth').addEventListener('click', () => {
    if (curIdx > 0) { curIdx--; renderMonth(); }
  });
  document.getElementById('nextMonth').addEventListener('click', () => {
    if (curIdx < monthKeys.length - 1) { curIdx++; renderMonth(); }
  });

  /* ══════════════════════════════════════════════════════════
     LOAD DA API
  ══════════════════════════════════════════════════════════ */
  async function loadRFS() {
    const btn = document.getElementById('refreshBtn');
    btn.disabled = true;
    btn.textContent = 'Atualizando…';

    try {
      const res  = await fetch('/api/rfs');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      allReunioes = await res.json();

      // Monta lista de meses únicos com dados
      const keySet = new Set(allReunioes.map(r => monthKey(r.date)));
      monthKeys    = [...keySet].sort();

      if (monthKeys.length === 0) {
        document.getElementById('rfsBody').innerHTML =
          `<tr><td colspan="4" style="text-align:center;padding:40px;color:#aaa;">Nenhuma reunião encontrada.</td></tr>`;
        document.getElementById('monthLabel').textContent = '—';
        return;
      }

      // Posiciona no mês atual (ou no mais próximo)
      const today   = new Date();
      const todayKey = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}`;
      const found    = monthKeys.indexOf(todayKey);
      curIdx = found >= 0 ? found : monthKeys.length - 1;

      renderMonth();
    } catch (e) {
      document.getElementById('rfsBody').innerHTML =
        `<tr><td colspan="4" style="text-align:center;padding:40px;color:#c00;">
          Erro ao carregar: ${h(e.message)}
        </td></tr>`;
      document.getElementById('monthLabel').textContent = 'Erro';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Atualizar';
    }
  }

  loadRFS();
  </script>

</body>
</html>
