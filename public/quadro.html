<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quadro de Anúncios</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ══════════════════════════════════════════════════════
       CONTROLES
    ══════════════════════════════════════════════════════ */
    .quadro-controls {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .quadro-controls select {
      padding: 8px 14px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
      font-weight: 600;
      background: #fff;
      cursor: pointer;
    }
    .btn-print {
      background: #1a5c1a;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-print:hover { background: #267a26; }

    /* ══════════════════════════════════════════════════════
       PÁGINAS A4 — simulação na tela, real na impressão
    ══════════════════════════════════════════════════════ */
    #quadroOutput { display: none; }
    #quadroOutput.visible { display: block; }

    .a4-page {
      background: #fff;
      width: min(794px, 100%);
      min-height: 1123px;          /* altura A4 @ 96dpi */
      margin: 0 auto 24px;
      box-shadow: 0 2px 16px rgba(0,0,0,.15);
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 12px;
      color: #111;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    /* Conteúdo que expande para preencher o restante da página */
    .a4-fill {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .a4-fill > .rvm-wrap { flex: 1; }
    .a4-fill > .qa-table-wrap { flex: 1; }

    /* ══════════════════════════════════════════════════════
       CAPA
    ══════════════════════════════════════════════════════ */
    .capa-page {
      display: flex;
      min-height: 500px;
    }
    .capa-left {
      flex: 1;
      background: #2eb8cc;
      color: #fff;
      padding: 40px 32px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 28px;
    }
    .capa-titulo {
      font-size: 38px;
      font-weight: 900;
      text-transform: uppercase;
      line-height: 1.1;
      letter-spacing: 1px;
    }
    .capa-divider {
      border: 2px solid rgba(255,255,255,.6);
      margin: 0;
    }
    .capa-cong {
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      line-height: 1.7;
    }
    .capa-lista {
      list-style: none;
      padding: 0; margin: 0;
      font-size: 13px;
      line-height: 2;
    }
    .capa-lista li::before { content: "• "; }
    .capa-right {
      width: 80px;
      background: #d0d0d0;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 16px 10px;
    }
    .capa-data {
      font-size: 10px;
      color: #555;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      transform: rotate(180deg);
      white-space: nowrap;
    }

    /* ══════════════════════════════════════════════════════
       CABEÇALHO DE SEÇÃO (título da página interna)
    ══════════════════════════════════════════════════════ */
    .qa-page-title {
      text-align: center;
      padding: 14px 20px 0;
      font-size: 16px;
      font-weight: 800;
      text-transform: capitalize;
      border-bottom: 2px solid #111;
      margin-bottom: 0;
      letter-spacing: .3px;
    }

    /* ══════════════════════════════════════════════════════
       TABELAS (Designações, RFS, Limpeza)
       — usa o visual já existente no site
    ══════════════════════════════════════════════════════ */
    .qa-table-wrap {
      padding: 14px 16px 20px;
    }
    .qa-table-section-title {
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .7px;
      background: #111;
      color: #fff;
      padding: 6px 12px;
      margin-bottom: 0;
    }
    /* Label de sub-seção dentro de uma página combinada */
    .qa-section-label {
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .5px;
      background: #333;
      color: #fff;
      padding: 5px 16px;
      margin-top: 10px;
    }
    .qa-section-label:first-child { margin-top: 0; }
    .qa-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11.5px;
    }
    .qa-table thead th {
      background: #111;
      color: #fff;
      padding: 7px 8px;
      text-align: center;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .qa-table thead th.left { text-align: left; padding-left: 12px; }
    .qa-table tbody td {
      padding: 7px 8px;
      text-align: center;
      border-bottom: 1px solid #e8e8e8;
      vertical-align: middle;
    }
    .qa-table tbody td.left { text-align: left; padding-left: 12px; }
    .qa-table tbody tr:nth-child(even) td { background: #f5f5f5; }
    .qa-table tbody tr:nth-child(odd)  td { background: #fff; }
    .qa-table .td-date {
      font-weight: 700;
      white-space: nowrap;
      text-align: left;
      padding-left: 12px;
    }

    /* ══════════════════════════════════════════════════════
       RVM — exatamente o mesmo layout do site (rvm.html)
    ══════════════════════════════════════════════════════ */
    .rvm-wrap { padding: 10px 16px 20px; }

    .rvm-week-card {
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 16px;
      box-shadow: 0 1px 6px rgba(0,0,0,.10);
    }

    /* Header da semana */
    .rvm-week-header {
      background: #111;
      color: #fff;
      padding: 10px 14px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 6px;
    }
    .rvm-week-date  { font-size: 15px; font-weight: 700; }
    .rvm-week-leit  { font-size: 11px; opacity: .8; }

    /* Meta (presidente/ajudante/orações/cânticos) */
    .rvm-week-meta {
      background: #f8f8f8;
      border-bottom: 1px solid #e0e0e0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      font-size: 11px;
    }
    .rvm-meta-cell {
      padding: 7px 12px;
      border-right: 1px solid #e0e0e0;
      line-height: 1.6;
    }
    .rvm-meta-cell:last-child { border-right: none; }
    .rvm-meta-label {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      color: #888;
      display: block;
      letter-spacing: .3px;
    }

    /* Bloco de seção */
    .rvm-block-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 12px;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .rvm-block-header .cantico-badge {
      font-size: 10px;
      font-weight: 600;
      opacity: .9;
      text-transform: none;
      letter-spacing: 0;
    }
    .rvm-tesouros .rvm-block-header { background: #154360; color: #fff; }
    .rvm-escola   .rvm-block-header { background: #d4ac0d; color: #1a1a1a; }
    .rvm-vida     .rvm-block-header { background: #7b241c; color: #fff; }

    .rvm-item {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 5px 12px;
      border-bottom: 1px solid #f0f0f0;
      font-size: 11px;
      gap: 8px;
    }
    .rvm-item:last-child { border-bottom: none; }
    .rvm-item-titulo { flex: 1; color: #444; line-height: 1.4; }
    .rvm-item-pessoa { font-weight: 700; white-space: nowrap; }
    .rvm-item-sala   { font-size: 10px; color: #888; }
    .rvm-item-comentarios .rvm-item-titulo { color: #999; font-style: italic; }

    /* ══════════════════════════════════════════════════════
       MAPA — ocupa toda a folha
    ══════════════════════════════════════════════════════ */
    .mapa-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 16px 16px;
    }
    .mapa-wrap img {
      width: 100%;
      height: 100%;
      max-height: 1020px;
      object-fit: contain;
      display: block;
      border-radius: 4px;
    }

    /* ══════════════════════════════════════════════════════
       GRUPOS
    ══════════════════════════════════════════════════════ */
    .grupos-wrap { padding: 14px 16px 20px; overflow-x: auto; }
    .grupos-total {
      text-align: center;
      font-size: 12px;
      font-weight: 700;
      color: #444;
      margin-bottom: 8px;
    }
    .grupos-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
      min-width: 560px;
    }
    .grupos-table th, .grupos-table td {
      border: 1px solid #bbb;
      padding: 4px 6px;
      text-align: center;
      vertical-align: top;
    }
    .grupos-table .gh {
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      padding: 6px 4px;
    }
    .grupos-table .gi { font-size: 10px; font-weight: 600; line-height: 1.5; }
    .grupos-table .gt { background: #ddd; font-weight: 700; font-size: 11px; }
    .grupos-table .gm:nth-child(even) td { background: #f7f7f7; }
    .grupos-table [data-col="0"] { background: #c9aee5; color: #3b0070; }
    .grupos-table [data-col="1"] { background: #88cc88; color: #0a4a0a; }
    .grupos-table [data-col="2"] { background: #f0d060; color: #5a3a00; }
    .grupos-table [data-col="3"] { background: #80b8e8; color: #002f6a; }
    .grupos-table [data-col="4"] { background: #f0a0a8; color: #6a0020; }
    .grupos-table [data-col="5"] { background: #90cca0; color: #0a4020; }

    /* ══════════════════════════════════════════════════════
       IMPRESSÃO
    ══════════════════════════════════════════════════════ */
    @media print {
      .navbar, .app > .section > .section-header,
      .quadro-controls, .btn-print { display: none !important; }
      .app { padding: 0; max-width: none; }
      #quadroOutput { display: block !important; }
      .a4-page {
        width: 100%;
        box-shadow: none;
        margin: 0;
        page-break-after: always;
      }
      .a4-page:last-child { page-break-after: avoid; }
      @page { size: A4; margin: 0.8cm; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <ul class="navbar-links">
      <li><a href="/" class="nav-link">Designações</a></li>
      <li><a href="/rvm.html" class="nav-link">RVM</a></li>
      <li><a href="/rfs.html" class="nav-link">RFS</a></li>
      <li><a href="/grupos.html" class="nav-link">Grupos</a></li>
      <li><a href="/quadro.html" class="nav-link active">Quadro</a></li>
    </ul>
  </nav>

  <div class="app">
    <section class="section">
      <div class="section-header">
        <h1 class="section-title">Quadro de Anúncios</h1>
      </div>

      <div class="quadro-controls">
        <select id="selMes"></select>
        <button class="generate-btn" id="btnGerar">Gerar Quadro</button>
        <button class="btn-print" id="btnPrint" style="display:none">🖨️ Imprimir / Salvar PDF</button>
      </div>

      <div id="quadroOutput"></div>
    </section>
  </div>

<script>
/* ══════════════════════════════════════════════════════════
   CONSTANTES
══════════════════════════════════════════════════════════ */
const MESES     = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
                   'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const MESES_ABR = ['jan','fev','mar','abr','mai','jun',
                   'jul','ago','set','out','nov','dez'];

const h = s => String(s ?? '')
  .replace(/&/g,'&amp;').replace(/</g,'&lt;')
  .replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function dayAbr(iso) {
  const [y,m,d] = iso.split('-').map(Number);
  return ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'][new Date(y,m-1,d).getDay()];
}
function fmtShort(iso) {            // "01/jun"
  const [,m,d] = iso.split('-');
  return `${parseInt(d)}/${MESES_ABR[parseInt(m)-1]}`;
}
function fmtLong(iso) {             // "1 de Junho de 2026"
  const [y,m,d] = iso.split('-');
  return `${parseInt(d)} de ${MESES[parseInt(m)-1]} de ${y}`;
}
function monthLabel(y, m) { return `${MESES[m-1]} de ${y}`; }

// Hoje no formato YYYY-MM
const todayKey = (() => {
  const t = new Date();
  return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}`;
})();

/* ══════════════════════════════════════════════════════════
   SELETOR DE MÊS
══════════════════════════════════════════════════════════ */
(function() {
  const sel = document.getElementById('selMes');
  const today = new Date();
  for (let delta = -3; delta <= 9; delta++) {
    const d = new Date(today.getFullYear(), today.getMonth() + delta, 1);
    const y = d.getFullYear(), m = d.getMonth() + 1;
    const opt = document.createElement('option');
    opt.value = `${y}-${m}`;
    opt.textContent = `${MESES[m-1]} ${y}`;
    if (delta === 0) opt.selected = true;
    sel.appendChild(opt);
  }
})();

/* ══════════════════════════════════════════════════════════
   FETCH
══════════════════════════════════════════════════════════ */
async function fetchAll(year, month) {
  const prefix = `${year}-${String(month).padStart(2,'0')}`;
  const [desig, allRfs, allRvm, grupos] = await Promise.all([
    fetch(`/api/assignments/${year}/${month}`).then(r => r.json()),
    fetch('/api/rfs').then(r => r.json()),
    fetch('/api/rvm').then(r => r.json()),
    fetch('/api/grupos').then(r => r.json()),
  ]);
  return {
    desig,
    rfs:    allRfs.filter(r => r.date.startsWith(prefix)),
    rvm:    allRvm.filter(s => s.date.startsWith(prefix)),
    grupos,
  };
}

/* ══════════════════════════════════════════════════════════
   PÁGINA 1 — CAPA
══════════════════════════════════════════════════════════ */
function buildCapa(year, month) {
  const now = new Date();
  const dataAtualizacao = `${String(now.getDate()).padStart(2,'0')}/${String(now.getMonth()+1).padStart(2,'0')}/${now.getFullYear()}`;
  return `
  <div class="a4-page capa-page">
    <div class="capa-left">
      <div class="capa-titulo">Quadro de<br>Anúncios</div>
      <hr class="capa-divider">
      <div class="capa-cong">
        Congregação Candeias<br>
        <span style="font-weight:400;font-size:12px">Jaboatão dos Guararapes – PE</span>
      </div>
      <ul class="capa-lista">
        <li>Reunião de Meio de Semana</li>
        <li>Reunião de Fim de Semana</li>
        <li>Designações Mecânicas</li>
        <li>Programação de Limpeza</li>
        <li>Grupos de Saída de Campo</li>
        <li>Mapa do Território</li>
      </ul>
      <div style="font-size:13px;font-weight:700">${monthLabel(year, month)}</div>
    </div>
    <div class="capa-right">
      <span class="capa-data">Atualização: ${dataAtualizacao}</span>
    </div>
  </div>`;
}

/* ══════════════════════════════════════════════════════════
   PÁGINAS RVM — mesmo layout do site
══════════════════════════════════════════════════════════ */
function renderRvmWeek(s) {
  const canticos = s.canticos || [];

  const mkItem = (it) => {
    if (!it) return '';
    if (it.tipo === 'comentarios') {
      return `<div class="rvm-item rvm-item-comentarios">
        <span class="rvm-item-titulo">${h(it.titulo)}</span>
      </div>`;
    }
    if (it.tipo === 'ebc') {
      return `<div class="rvm-item">
        <span class="rvm-item-titulo">${h(it.titulo)}</span>
        <span class="rvm-item-pessoa">${h(it.dirigente)} / ${h(it.leitor)}</span>
      </div>`;
    }
    const salaB = it.salaB ? `<br><span class="rvm-item-sala">Sala B: ${h(it.salaB)}</span>` : '';
    const pessoa = it.salaA || it.pessoa || '—';
    return `<div class="rvm-item">
      <span class="rvm-item-titulo">${h(it.titulo)}</span>
      <span class="rvm-item-pessoa">${h(pessoa)}${salaB}</span>
    </div>`;
  };

  return `
  <div class="rvm-week-card">
    <div class="rvm-week-header">
      <span class="rvm-week-date">${fmtLong(s.date)}</span>
      <span class="rvm-week-leit">Leitura: ${h(s.leitura||'')}</span>
    </div>
    <div class="rvm-week-meta">
      <div class="rvm-meta-cell">
        <span class="rvm-meta-label">Presidente</span>${h(s.presidente||'—')}
        <br><span class="rvm-meta-label" style="margin-top:4px">Ajudante</span>${h(s.ajudante||'—')}
      </div>
      <div class="rvm-meta-cell">
        <span class="rvm-meta-label">Oração Inicial</span>${h(s.oracaoInicial||'—')}
        <br><span class="rvm-meta-label" style="margin-top:4px">Oração Final</span>${h(s.oracaoFinal||'—')}
      </div>
    </div>

    <div class="rvm-tesouros">
      <div class="rvm-block-header">
        Tesouros da Palavra de Deus
        ${canticos[0] ? `<span class="cantico-badge">${h(canticos[0])}</span>` : ''}
      </div>
      ${(s.tesouros||[]).map(mkItem).join('')}
    </div>

    <div class="rvm-escola">
      <div class="rvm-block-header">
        Faça Seu Melhor no Ministério
        ${canticos[1] ? `<span class="cantico-badge">${h(canticos[1])}</span>` : ''}
      </div>
      ${(s.escola||[]).map(mkItem).join('')}
    </div>

    <div class="rvm-vida">
      <div class="rvm-block-header">
        Nossa Vida Cristã
        ${canticos[2] ? `<span class="cantico-badge">${h(canticos[2])}</span>` : ''}
      </div>
      ${(s.vida||[]).map(mkItem).join('')}
    </div>
  </div>`;
}

function buildPagesRVM(rvm, year, month) {
  if (!rvm.length) {
    return `<div class="a4-page">
      <div class="qa-page-title">Programação da Reunião de Meio de Semana</div>
      <div class="rvm-wrap" style="padding:20px;color:#aaa;font-style:italic">Programação não disponível para este mês.</div>
    </div>`;
  }
  // 2 semanas por página
  const pages = [];
  for (let i = 0; i < rvm.length; i += 2) {
    const chunk = rvm.slice(i, i + 2);
    pages.push(`
      <div class="a4-page">
        <div class="qa-page-title">Programação da Reunião de Meio de Semana</div>
        <div class="a4-fill"><div class="rvm-wrap">${chunk.map(renderRvmWeek).join('')}</div></div>
      </div>`);
  }
  return pages.join('');
}

/* ══════════════════════════════════════════════════════════
   PÁGINA ÚNICA: RFS + DESIGNAÇÕES + LIMPEZA
══════════════════════════════════════════════════════════ */
function buildPageRFS(rfs) {
  const rows = rfs.length
    ? rfs.map(r => {
        const congr = r.congregacao ? `<br><span style="font-size:10px;color:#888">(${h(r.congregacao)})</span>` : '';
        return `<tr>
          <td class="td-date">${fmtShort(r.date)}</td>
          <td class="left">${h(r.tema||'—')}</td>
          <td>${h(r.orador||'—')}${congr}</td>
          <td>${h(r.presidente||'—')}</td>
        </tr>`;
      }).join('')
    : `<tr><td colspan="4" style="text-align:center;color:#aaa;padding:10px;font-style:italic">Nenhuma reunião registrada.</td></tr>`;

  return `
    <div class="qa-section-label">Reuniões de Fim de Semana</div>
    <div class="qa-table-wrap" style="padding-bottom:0">
      <table class="qa-table">
        <thead><tr>
          <th class="left" style="width:56px">Data</th>
          <th class="left">Tema</th>
          <th style="width:150px">Orador (Congregação)</th>
          <th style="width:120px">Presidente</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function buildPageDesig(desig) {
  const rowsDesig = desig.length
    ? desig.map(a => `<tr>
        <td class="td-date">${fmtShort(a.date)}</td>
        <td>${h(a.indicador_externo||'—')}</td>
        <td>${h(a.indicador_interno||'—')}</td>
        <td>${h(a.volante1||'—')}</td>
        <td>${h(a.volante2||'—')}</td>
        <td>${h(a.audio||'—')}</td>
      </tr>`).join('')
    : `<tr><td colspan="6" style="text-align:center;color:#aaa;padding:10px;font-style:italic">Designações não geradas para este mês.</td></tr>`;

  const rowsLimp = desig.length
    ? desig.map(a => `<tr>
        <td class="td-date">${fmtShort(a.date)}</td>
        <td class="left">${h(a.limpeza||'—')}</td>
      </tr>`).join('')
    : `<tr><td colspan="2" style="text-align:center;color:#aaa;padding:10px;font-style:italic">—</td></tr>`;

  return `
    <div class="qa-section-label">Designações Mecânicas</div>
    <div class="qa-table-wrap" style="padding-bottom:0">
      <table class="qa-table">
        <thead><tr>
          <th class="left" style="width:56px">Data</th>
          <th>Ind. Externo</th>
          <th>Ind. Interno</th>
          <th>Volante 1</th>
          <th>Volante 2</th>
          <th>Áudio/Vídeo</th>
        </tr></thead>
        <tbody>${rowsDesig}</tbody>
      </table>
    </div>

    <div class="qa-section-label" style="margin-top:10px">Programação de Limpeza</div>
    <div class="qa-table-wrap">
      <table class="qa-table">
        <thead><tr>
          <th class="left" style="width:56px">Reunião</th>
          <th class="left">Grupos Responsáveis</th>
        </tr></thead>
        <tbody>${rowsLimp}</tbody>
      </table>
    </div>`;
}

function buildPageRFSDesigLimp(rfs, desig, year, month) {
  return `
  <div class="a4-page">
    <div class="qa-page-title">Designações — ${monthLabel(year, month)}</div>
    <div class="a4-fill">
      ${buildPageRFS(rfs)}
      ${buildPageDesig(desig)}
    </div>
  </div>`;
}

/* ══════════════════════════════════════════════════════════
   PÁGINA GRUPOS
══════════════════════════════════════════════════════════ */
function buildPageGrupos(grupos) {
  if (!grupos?.length) {
    return `<div class="a4-page">
      <div class="qa-page-title">Grupos de Saída de Campo</div>
      <div style="padding:20px;color:#aaa;font-style:italic">Dados não disponíveis.</div>
    </div>`;
  }
  const total = grupos.reduce((s,g) => s+(g.total||0), 0);
  const maxM  = Math.max(...grupos.map(g => g.membros.length));

  const headNome = grupos.map((g,i) =>
    `<th class="gh" data-col="${i}">${h(g.nome)}</th>`).join('');
  const headInfo = grupos.map((g,i) =>
    `<td class="gi" data-col="${i}">Dirigente: ${h(g.dirigente)}<br>Ajudante: ${h(g.ajudante)}<br>Local: ${h(g.local)}</td>`).join('');
  const headTot = grupos.map(g =>
    `<td class="gt">Total ${h(g.nome.charAt(0)+g.nome.slice(1).toLowerCase())} = ${g.total}</td>`).join('');

  let membros = '';
  for (let i = 0; i < maxM; i++) {
    const cells = grupos.map(g => {
      const n = g.membros[i]||'';
      return n ? `<td>${h(n)}</td>` : `<td style="color:#ddd">—</td>`;
    }).join('');
    membros += `<tr class="gm">${cells}</tr>`;
  }

  return `
  <div class="a4-page">
    <div class="qa-page-title">Grupos de Saída de Campo</div>
    <div class="grupos-wrap">
      <div class="grupos-total">Total Geral de Publicadores = ${total}</div>
      <table class="grupos-table">
        <thead>
          <tr>${headNome}</tr>
          <tr>${headInfo}</tr>
          <tr>${headTot}</tr>
        </thead>
        <tbody>${membros}</tbody>
      </table>
    </div>
  </div>`;
}

/* ══════════════════════════════════════════════════════════
   PÁGINA MAPA
══════════════════════════════════════════════════════════ */
function buildPageMapa() {
  return `
  <div class="a4-page">
    <div class="qa-page-title">Mapa do Território</div>
    <div class="mapa-wrap">
      <img src="/mapa/mapa 5000.png" alt="Mapa do Território de Candeias" />
    </div>
  </div>`;
  /* mapa-wrap já tem flex:1 via CSS, expande até preencher a folha */
}

/* ══════════════════════════════════════════════════════════
   GERAR
══════════════════════════════════════════════════════════ */
document.getElementById('btnGerar').addEventListener('click', async () => {
  const [year, month] = document.getElementById('selMes').value.split('-').map(Number);
  const btn = document.getElementById('btnGerar');
  const out = document.getElementById('quadroOutput');
  btn.disabled = true;
  btn.textContent = 'Carregando…';
  out.className = '';
  out.innerHTML = '<div style="text-align:center;padding:40px;color:#aaa">Buscando dados…</div>';

  try {
    const { desig, rfs, rvm, grupos } = await fetchAll(year, month);

    // ORDEM: Capa → RVM → [RFS + Designações + Limpeza] → Grupos → Mapa
    out.innerHTML =
      buildCapa(year, month)                       +
      buildPagesRVM(rvm, year, month)              +
      buildPageRFSDesigLimp(rfs, desig, year, month) +
      buildPageGrupos(grupos)                      +
      buildPageMapa();

    out.className = 'visible';
    document.getElementById('btnPrint').style.display = '';
  } catch(e) {
    out.innerHTML = `<div style="text-align:center;padding:40px;color:#c00">Erro: ${h(e.message)}</div>`;
    out.className = 'visible';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Gerar Quadro';
  }
});

document.getElementById('btnPrint').addEventListener('click', () => window.print());
</script>
