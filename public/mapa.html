<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mapa dos Territórios</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── Card do mapa ── */
    .mapa-card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,.13);
      overflow: hidden;
    }

    /* ── Imagem: ocupa a largura toda, altura proporcional ── */
    .mapa-card img {
      display: block;
      width: 100%;
      height: auto;
      touch-action: pan-x pan-y pinch-zoom;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* ── Rodapé discreto com dica ── */
    .mapa-hint {
      text-align: center;
      font-size: 12px;
      color: #aaa;
      padding: 10px 16px;
      border-top: 1px solid #eee;
    }
    .mapa-hint a {
      color: #888;
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <ul class="navbar-links">
      <li><a href="/designacoes" class="nav-link">Designações</a></li>
      <li><a href="/rvm.html" class="nav-link">RVM</a></li>
      <li><a href="/rfs.html" class="nav-link">RFS</a></li>
      <li><a href="/grupos.html" class="nav-link">Grupos</a></li>
      <li><a href="/quadro.html" class="nav-link">Quadro</a></li>
      <li><a href="/mapa.html" class="nav-link active">Mapa</a></li>
    </ul>
  </nav>

  <div class="app">
    <section class="section">
      <div class="section-header">
        <h1 class="section-title">Mapa dos Territórios</h1>
      </div>

      <div class="mapa-card">
        <img src="/mapa/mapa 5000.png" alt="Mapa dos Territórios" />
        <div class="mapa-hint">
          No celular: aproxime dois dedos para dar zoom &nbsp;·&nbsp;
          <a href="/mapa/mapa 5000.png" target="_blank">Abrir imagem completa</a>
        </div>
      </div>
    </section>
  </div>

</body>
</html>
